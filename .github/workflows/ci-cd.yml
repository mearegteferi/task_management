name: CI/CD

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      SECRET_KEY: test-secret-key
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_SERVER: postgres
      POSTGRES_DB: task_db
      REDIS_URL: redis://redis:6379/0
      FRONTEND_HOST: http://localhost:3000

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: backend/uv.lock

      - name: Install backend dependencies
        run: uv sync --frozen --all-groups

      - name: Ruff check
        run: uv run ruff check app tests

      - name: Ruff format check
        run: uv run ruff format --check app tests

      - name: ty check
        run: uv run ty check

      - name: Backend tests
        run: uv run pytest

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Lint frontend
        run: npm run lint

      - name: Typecheck frontend
        run: npm run typecheck

      - name: Build frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
        run: npm run build

  containers:
    name: Docker
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare backend env file
        run: cp backend/.env.example backend/.env

      - name: Validate compose configuration
        run: docker compose config

      - name: Build containers
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
        run: docker compose build

  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    needs: [backend, frontend, containers]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
      RAILWAY_ENVIRONMENT_NAME: ${{ secrets.RAILWAY_ENVIRONMENT_NAME }}
      RAILWAY_BACKEND_SERVICE: ${{ secrets.RAILWAY_BACKEND_SERVICE }}
      RAILWAY_FRONTEND_SERVICE: ${{ secrets.RAILWAY_FRONTEND_SERVICE }}
      RAILWAY_BACKEND_HEALTHCHECK_URL: ${{ secrets.RAILWAY_BACKEND_HEALTHCHECK_URL }}
      RAILWAY_FRONTEND_URL: ${{ secrets.RAILWAY_FRONTEND_URL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install --global @railway/cli

      - name: Deploy backend
        run: >
          railway up
          --ci
          --project "${RAILWAY_PROJECT_ID}"
          --environment "${RAILWAY_ENVIRONMENT_NAME}"
          --service "${RAILWAY_BACKEND_SERVICE}"
          --path backend
          --path-as-root

      - name: Deploy frontend
        run: >
          railway up
          --ci
          --project "${RAILWAY_PROJECT_ID}"
          --environment "${RAILWAY_ENVIRONMENT_NAME}"
          --service "${RAILWAY_FRONTEND_SERVICE}"
          --path frontend
          --path-as-root

      - name: Smoke test backend
        shell: bash
        run: |
          if [ -n "${RAILWAY_BACKEND_HEALTHCHECK_URL}" ]; then
            curl --fail --show-error --silent "${RAILWAY_BACKEND_HEALTHCHECK_URL}/health" > /dev/null
          fi

      - name: Smoke test frontend
        shell: bash
        run: |
          if [ -n "${RAILWAY_FRONTEND_URL}" ]; then
            curl --fail --show-error --silent "${RAILWAY_FRONTEND_URL}" > /dev/null
          fi
